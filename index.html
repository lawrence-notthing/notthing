<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nothing to see</title>
    <style>
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Plain grey background */
            background-color: #f5f5f5;
            /* White text */
            color: #ffffff;
            /* Minimalistic font stack */
            font-family: "Helvetica Neue", Helvetica, "Univers", "Futura", Arial, sans-serif;
            font-weight: bold;
            /* Full screen height and flex centering */
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* Remove potential scrollbars */
            overflow: hidden;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
            font-weight: normal;
        }

        /* Responsive adjustments for mobile */
        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <main>
        <h1>Notthing</h1>
      
    </main>

</body>
</html>
